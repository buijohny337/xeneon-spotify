<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify — Xeneon Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sp-bg: #0a0a0a;
    --sp-surface: #111111;
    --sp-card: #161616;
    --sp-border: rgba(255,255,255,0.06);
    --sp-green: #1DB954;
    --sp-green-dim: rgba(29,185,84,0.15);
    --sp-text: #e8e8e8;
    --sp-muted: #666;
    --sp-subtle: #2a2a2a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--sp-bg);
    font-family: 'Syne', sans-serif;
    color: var(--sp-text);
    overflow: hidden;
  }

  /* ─── LOGIN SCREEN ─── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 28px;
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .login-logo .dot {
    width: 32px; height: 32px;
    background: var(--sp-green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .login-logo .dot i { font-size: 18px; color: #000; }

  .login-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--sp-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .login-btn {
    background: var(--sp-green);
    color: #000;
    border: none;
    border-radius: 500px;
    padding: 14px 40px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.1s, background 0.15s;
  }

  .login-btn:hover { background: #1ed760; transform: scale(1.03); }

  .client-id-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--sp-muted);
    text-align: center;
    line-height: 1.8;
  }

  .client-id-note a { color: var(--sp-green); text-decoration: none; }

  /* ─── MAIN PLAYER ─── */
  #player-screen {
    display: none;
    width: 100vw;
    height: 100vh;
    grid-template-columns: 240px 1fr 210px;
    grid-template-rows: 1fr;
  }

  #player-screen.active { display: grid; }

  /* LEFT */
  #now-playing {
    background: var(--sp-surface);
    border-right: 0.5px solid var(--sp-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 18px;
    gap: 16px;
  }

  #album-art {
    width: 130px; height: 130px;
    border-radius: 8px;
    background: var(--sp-card);
    overflow: hidden;
    flex-shrink: 0;
    border: 0.5px solid var(--sp-border);
    position: relative;
  }

  #album-art img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }

  #album-art.spinning img {
    animation: spin 8s linear infinite;
    transform-origin: center;
    border-radius: 50%;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .track-info { text-align: center; width: 100%; }

  .track-title {
    font-size: 14px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }

  .track-artist {
    font-size: 11px; color: var(--sp-muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    font-weight: 300; letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .track-album {
    font-size: 10px; color: #444;
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .like-row {
    display: flex; align-items: center; gap: 16px;
  }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--sp-muted); font-size: 18px; padding: 4px;
    border-radius: 50%; display: flex; align-items: center;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
  }

  .icon-btn:hover { color: var(--sp-text); transform: scale(1.1); }
  .icon-btn.liked { color: var(--sp-green); }

  /* CENTER */
  #player-center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 32px 16px;
    gap: 14px;
  }

  .waveform-wrap {
    height: 52px; width: 100%;
    cursor: pointer; position: relative;
  }

  #waveform-canvas { width: 100%; height: 100%; display: block; }

  .progress-row {
    display: flex; align-items: center; gap: 10px;
  }

  .time-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--sp-muted);
    min-width: 32px;
  }

  .time-label.right { text-align: right; }

  .progress-bar {
    flex: 1; height: 3px;
    background: var(--sp-subtle);
    border-radius: 2px; position: relative; cursor: pointer;
  }

  .progress-fill {
    height: 100%; background: var(--sp-green);
    border-radius: 2px; width: 0%;
    transition: width 0.5s linear;
  }

  .progress-dot {
    width: 10px; height: 10px;
    background: white; border-radius: 50%;
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    left: 0%;
    transition: left 0.5s linear;
    pointer-events: none;
  }

  .controls {
    display: flex; align-items: center;
    justify-content: center; gap: 22px;
  }

  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--sp-muted); font-size: 20px; padding: 4px;
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; line-height: 1;
    transition: color 0.15s, transform 0.1s;
  }

  .ctrl-btn:hover { color: var(--sp-text); transform: scale(1.1); }
  .ctrl-btn.active { color: var(--sp-green); }

  .ctrl-btn.play-btn {
    width: 48px; height: 48px;
    background: var(--sp-green); color: #000;
    font-size: 22px; border-radius: 50%;
    transition: transform 0.1s, background 0.15s;
  }

  .ctrl-btn.play-btn:hover { background: #1ed760; transform: scale(1.06); color: #000; }

  .bottom-bar {
    display: flex; align-items: center;
    justify-content: space-between;
    padding-top: 4px;
  }

  .vol-row { display: flex; align-items: center; gap: 8px; }

  .vol-bar {
    width: 80px; height: 3px;
    background: var(--sp-subtle);
    border-radius: 2px; cursor: pointer; position: relative;
  }

  .vol-fill {
    height: 100%; background: var(--sp-muted);
    border-radius: 2px; width: 70%;
    transition: background 0.2s;
  }

  .vol-bar:hover .vol-fill { background: var(--sp-green); }

  .device-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--sp-green);
    letter-spacing: 0.5px;
    background: var(--sp-green-dim);
    padding: 3px 9px; border-radius: 4px;
    border: 0.5px solid rgba(29,185,84,0.2);
    white-space: nowrap;
  }

  /* RIGHT — Queue */
  #queue-panel {
    background: var(--sp-surface);
    border-left: 0.5px solid var(--sp-border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .queue-header {
    padding: 14px 14px 10px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; color: var(--sp-muted);
    border-bottom: 0.5px solid var(--sp-border);
    text-transform: uppercase;
  }

  .queue-list {
    flex: 1; overflow-y: auto; padding: 6px 0;
  }

  .queue-list::-webkit-scrollbar { width: 0; }

  .queue-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; cursor: pointer;
    border-radius: 4px; margin: 0 4px;
    transition: background 0.1s;
  }

  .queue-item:hover { background: rgba(255,255,255,0.04); }
  .queue-item.active { background: var(--sp-green-dim); }
  .queue-item.active .qi-title { color: var(--sp-green); }

  .qi-thumb {
    width: 32px; height: 32px;
    border-radius: 4px; flex-shrink: 0;
    background: var(--sp-card);
    overflow: hidden;
  }

  .qi-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .qi-info { flex: 1; min-width: 0; }

  .qi-title {
    font-size: 11px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--sp-text);
  }

  .qi-artist {
    font-size: 10px; color: var(--sp-muted);
    font-family: 'DM Mono', monospace; font-weight: 300;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .qi-dur {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--sp-muted);
  }

  /* Error toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a1a1a; border: 0.5px solid var(--sp-border);
    color: var(--sp-muted); font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 10px 20px; border-radius: 6px;
    transition: transform 0.3s; z-index: 100;
    pointer-events: none;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Config banner */
  #config-bar {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(29,185,84,0.08);
    border-bottom: 0.5px solid rgba(29,185,84,0.2);
    padding: 8px 20px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--sp-green); letter-spacing: 0.3px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 50;
  }

  #config-bar.hidden { display: none; }

  #config-bar input {
    background: rgba(0,0,0,0.4);
    border: 0.5px solid rgba(29,185,84,0.3);
    color: var(--sp-text); font-family: 'DM Mono', monospace;
    font-size: 10px; padding: 4px 10px; border-radius: 4px;
    width: 260px; outline: none;
  }

  #config-bar button {
    background: var(--sp-green); color: #000;
    border: none; border-radius: 4px;
    padding: 4px 14px; font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700; cursor: pointer;
    margin-left: 8px;
  }
</style>
</head>
<body>

<!-- Config bar (shown until Client ID is set) -->
<div id="config-bar">
  <span><i class="ti ti-settings" style="vertical-align:-2px;margin-right:6px"></i>Enter your Spotify Client ID to connect</span>
  <div style="display:flex;align-items:center;gap:8px">
    <input id="client-id-input" type="text" placeholder="e.g. a1b2c3d4e5f6..." spellcheck="false">
    <button onclick="saveClientId()">Save</button>
    <a href="https://developer.spotify.com/dashboard" target="_blank"
       style="color:var(--sp-green);font-size:10px;text-decoration:none;margin-left:4px">
      Get one ↗
    </a>
  </div>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-logo">
    <div class="dot"><i class="ti ti-music"></i></div>
    SPOTIFY
  </div>
  <div class="login-sub">Xeneon Edge Display</div>
  <button class="login-btn" onclick="startAuth()">
    <i class="ti ti-brand-spotify" style="margin-right:8px;vertical-align:-2px"></i>
    Connect with Spotify
  </button>
  <div class="client-id-note">
    Requires a free Spotify Developer app.<br>
    <a href="https://developer.spotify.com/dashboard" target="_blank">Create one at developer.spotify.com</a><br>
    Set redirect URI to: <code style="color:var(--sp-muted)" id="redirect-display"></code>
  </div>
</div>

<!-- Player -->
<div id="player-screen">

  <!-- LEFT -->
  <div id="now-playing">
    <div id="album-art">
      <img id="album-img" src="" alt="Album art">
    </div>
    <div class="track-info">
      <div class="track-title" id="track-title">—</div>
      <div class="track-artist" id="track-artist">—</div>
      <div class="track-album" id="track-album"></div>
    </div>
    <div class="like-row">
      <button class="icon-btn" id="like-btn" onclick="toggleLike()" aria-label="Like">
        <i class="ti ti-heart" id="like-icon"></i>
      </button>
      <button class="icon-btn" onclick="openSpotify()" aria-label="Open in Spotify">
        <i class="ti ti-external-link"></i>
      </button>
    </div>
  </div>

  <!-- CENTER -->
  <div id="player-center">
    <div class="waveform-wrap">
      <canvas id="waveform-canvas" onclick="seekFromWaveform(event)"></canvas>
    </div>

    <div class="progress-row">
      <span class="time-label" id="elapsed">0:00</span>
      <div class="progress-bar" id="progress-bar" onclick="seekFromBar(event, this)">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-dot" id="progress-dot"></div>
      </div>
      <span class="time-label right" id="duration">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()" aria-label="Shuffle">
        <i class="ti ti-arrows-shuffle"></i>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" aria-label="Previous">
        <i class="ti ti-player-skip-back"></i>
      </button>
      <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlayback()" aria-label="Play/Pause">
        <i class="ti ti-player-play" id="play-icon"></i>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" aria-label="Next">
        <i class="ti ti-player-skip-forward"></i>
      </button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()" aria-label="Repeat">
        <i class="ti ti-repeat"></i>
      </button>
    </div>

    <div class="bottom-bar">
      <div class="vol-row">
        <i class="ti ti-volume" aria-hidden="true" style="font-size:15px;color:var(--sp-muted)"></i>
        <div class="vol-bar" id="vol-bar" onclick="setVolume(event, this)">
          <div class="vol-fill" id="vol-fill"></div>
        </div>
      </div>
      <span class="device-badge">
        <i class="ti ti-device-tv" style="font-size:10px;vertical-align:-1px;margin-right:4px"></i>
        XENEON EDGE
      </span>
      <div style="display:flex;gap:14px">
        <button class="ctrl-btn" style="font-size:16px" onclick="refreshState()" aria-label="Refresh">
          <i class="ti ti-refresh"></i>
        </button>
        <button class="ctrl-btn" style="font-size:16px" onclick="logout()" aria-label="Disconnect">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="queue-panel">
    <div class="queue-header">Up next</div>
    <div class="queue-list" id="queue-list">
      <div style="padding:16px 14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--sp-muted)">Loading queue…</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────

const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
const SCOPES = [
  'user-read-playback-state',
  'user-modify-playback-state',
  'user-read-currently-playing',
  'user-library-read',
  'user-library-modify',
  'user-read-queue'
].join(' ');

document.getElementById('redirect-display').textContent = REDIRECT_URI;

let CLIENT_ID = localStorage.getItem('sp_client_id') || '';
let accessToken = null;
let refreshToken = null;
let tokenExpiry = 0;
let currentTrackId = null;
let currentUri = null;
let pollInterval = null;
let progressInterval = null;
let progressMs = 0;
let durationMs = 1;
let isPlaying = false;
let shuffleState = false;
let repeatState = 'off';
let volumePct = 70;
let waveformSeeds = [];

if (CLIENT_ID) {
  document.getElementById('config-bar').classList.add('hidden');
  document.getElementById('client-id-input').value = CLIENT_ID;
}

// ─── CLIENT ID ────────────────────────────────────────────────────────────────

function saveClientId() {
  const val = document.getElementById('client-id-input').value.trim();
  if (!val) return showToast('Paste your Client ID first');
  CLIENT_ID = val;
  localStorage.setItem('sp_client_id', val);
  document.getElementById('config-bar').classList.add('hidden');
  showToast('Client ID saved');
}

// ─── PKCE AUTH ────────────────────────────────────────────────────────────────

function generateRandom(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function startAuth() {
  if (!CLIENT_ID) {
    document.getElementById('config-bar').classList.remove('hidden');
    showToast('Enter your Spotify Client ID above first');
    return;
  }
  const verifier = generateRandom(64);
  const challenge = await sha256(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: SCOPES,
  });

  window.location = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      client_id: CLIENT_ID,
      code_verifier: verifier,
    })
  });
  const data = await res.json();
  if (data.access_token) {
    storeTokens(data);
    window.history.replaceState({}, '', REDIRECT_URI);
    initPlayer();
  } else {
    showToast('Auth failed: ' + (data.error_description || data.error));
  }
}

async function refreshAccessToken() {
  const rToken = localStorage.getItem('sp_refresh_token');
  if (!rToken) { logout(); return; }
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: rToken,
      client_id: CLIENT_ID,
    })
  });
  const data = await res.json();
  if (data.access_token) storeTokens(data);
  else logout();
}

function storeTokens(data) {
  accessToken = data.access_token;
  tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
  if (data.refresh_token) {
    refreshToken = data.refresh_token;
    localStorage.setItem('sp_refresh_token', refreshToken);
  }
  localStorage.setItem('sp_access_token', accessToken);
  localStorage.setItem('sp_token_expiry', tokenExpiry);
}

async function getToken() {
  if (!accessToken || Date.now() > tokenExpiry) {
    accessToken = localStorage.getItem('sp_access_token');
    tokenExpiry = parseInt(localStorage.getItem('sp_token_expiry') || '0');
  }
  if (!accessToken || Date.now() > tokenExpiry) await refreshAccessToken();
  return accessToken;
}

function logout() {
  localStorage.removeItem('sp_access_token');
  localStorage.removeItem('sp_refresh_token');
  localStorage.removeItem('sp_token_expiry');
  accessToken = null;
  clearInterval(pollInterval);
  clearInterval(progressInterval);
  document.getElementById('player-screen').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function api(path, method = 'GET', body = null) {
  const token = await getToken();
  const opts = {
    method,
    headers: { Authorization: 'Bearer ' + token }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('https://api.spotify.com/v1' + path, opts);
  if (res.status === 204) return null;
  if (res.ok) return res.json().catch(() => null);
  const err = await res.json().catch(() => ({}));
  if (res.status === 401) { await refreshAccessToken(); return api(path, method, body); }
  throw new Error(err?.error?.message || res.statusText);
}

// ─── PLAYER STATE ─────────────────────────────────────────────────────────────

async function fetchState() {
  try {
    const state = await api('/me/player');
    if (!state) { showNoPlayback(); return; }
    applyState(state);
  } catch(e) { showToast('Could not reach Spotify'); }
}

function applyState(state) {
  if (!state?.item) { showNoPlayback(); return; }

  const track = state.item;
  const newId = track.id;
  isPlaying = state.is_playing;
  shuffleState = state.shuffle_state;
  repeatState = state.repeat_state;
  progressMs = state.progress_ms;
  durationMs = track.duration_ms;
  currentTrackId = newId;
  currentUri = track.uri;
  volumePct = state.device?.volume_percent ?? volumePct;

  // Art
  const imgUrl = track.album?.images?.[0]?.url || '';
  const imgEl = document.getElementById('album-img');
  if (imgEl.src !== imgUrl) imgEl.src = imgUrl;

  // Art spin
  const artEl = document.getElementById('album-art');
  isPlaying ? artEl.classList.add('spinning') : artEl.classList.remove('spinning');

  // Text
  document.getElementById('track-title').textContent = track.name;
  document.getElementById('track-artist').textContent = track.artists?.map(a => a.name).join(', ') || '';
  document.getElementById('track-album').textContent = track.album?.name || '';

  // Play/pause icon
  document.getElementById('play-icon').className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';

  // Shuffle/repeat
  const sbtn = document.getElementById('shuffle-btn');
  shuffleState ? sbtn.classList.add('active') : sbtn.classList.remove('active');
  const rbtn = document.getElementById('repeat-btn');
  repeatState !== 'off' ? rbtn.classList.add('active') : rbtn.classList.remove('active');

  // Volume
  document.getElementById('vol-fill').style.width = volumePct + '%';

  // Progress
  updateProgress();

  // Waveform (redraw if new track)
  if (waveformSeeds.length === 0 || newId !== currentTrackId) generateWaveform();
  drawWaveform();
}

function showNoPlayback() {
  document.getElementById('track-title').textContent = 'Nothing playing';
  document.getElementById('track-artist').textContent = 'Open Spotify on any device';
  document.getElementById('album-img').src = '';
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────

function updateProgress() {
  const pct = durationMs > 0 ? (progressMs / durationMs) * 100 : 0;
  document.getElementById('progress-fill').style.transition = 'width 0.5s linear';
  document.getElementById('progress-dot').style.transition = 'left 0.5s linear';
  document.getElementById('progress-fill').style.width = pct.toFixed(2) + '%';
  document.getElementById('progress-dot').style.left = pct.toFixed(2) + '%';
  document.getElementById('elapsed').textContent = msToTime(progressMs);
  document.getElementById('duration').textContent = msToTime(durationMs);
  drawWaveform();
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function startProgressTick() {
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) {
      progressMs = Math.min(progressMs + 1000, durationMs);
      updateProgress();
    }
  }, 1000);
}

// ─── QUEUE ────────────────────────────────────────────────────────────────────

async function fetchQueue() {
  try {
    const data = await api('/me/player/queue');
    renderQueue(data);
  } catch(e) {}
}

function renderQueue(data) {
  const list = document.getElementById('queue-list');
  const items = data?.queue?.slice(0, 12) || [];
  if (!items.length) {
    list.innerHTML = '<div style="padding:14px;font-family:\'DM Mono\',monospace;font-size:10px;color:var(--sp-muted)">Queue is empty</div>';
    return;
  }
  list.innerHTML = items.map((t, i) => {
    const thumb = t.album?.images?.[2]?.url || t.album?.images?.[0]?.url || '';
    return `<div class="queue-item" onclick="playUri('${t.uri}')">
      <div class="qi-thumb">${thumb ? `<img src="${thumb}" alt="">` : ''}</div>
      <div class="qi-info">
        <div class="qi-title">${escHtml(t.name)}</div>
        <div class="qi-artist">${escHtml(t.artists?.map(a=>a.name).join(', ') || '')}</div>
      </div>
      <span class="qi-dur">${msToTime(t.duration_ms)}</span>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────

async function togglePlayback() {
  try {
    if (isPlaying) {
      await api('/me/player/pause', 'PUT');
      isPlaying = false;
    } else {
      await api('/me/player/play', 'PUT');
      isPlaying = true;
    }
    document.getElementById('play-icon').className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';
    const art = document.getElementById('album-art');
    isPlaying ? art.classList.add('spinning') : art.classList.remove('spinning');
  } catch(e) { showToast('No active Spotify device found'); }
}

async function nextTrack() {
  try {
    await api('/me/player/next', 'POST');
    setTimeout(() => { fetchState(); fetchQueue(); }, 600);
  } catch(e) { showToast('Playback error'); }
}

async function prevTrack() {
  try {
    await api('/me/player/previous', 'POST');
    setTimeout(() => { fetchState(); fetchQueue(); }, 600);
  } catch(e) { showToast('Playback error'); }
}

async function toggleShuffle() {
  shuffleState = !shuffleState;
  await api(`/me/player/shuffle?state=${shuffleState}`, 'PUT').catch(()=>{});
  const btn = document.getElementById('shuffle-btn');
  shuffleState ? btn.classList.add('active') : btn.classList.remove('active');
}

async function toggleRepeat() {
  const states = ['off', 'context', 'track'];
  const next = states[(states.indexOf(repeatState) + 1) % 3];
  repeatState = next;
  await api(`/me/player/repeat?state=${next}`, 'PUT').catch(()=>{});
  const btn = document.getElementById('repeat-btn');
  next !== 'off' ? btn.classList.add('active') : btn.classList.remove('active');
}

async function seekFromBar(e, bar) {
  const pct = Math.max(0, Math.min(1, e.offsetX / bar.offsetWidth));
  const pos = Math.floor(pct * durationMs);
  progressMs = pos;
  updateProgress();
  await api(`/me/player/seek?position_ms=${pos}`, 'PUT').catch(()=>{});
}

async function seekFromWaveform(e) {
  const canvas = document.getElementById('waveform-canvas');
  const pct = Math.max(0, Math.min(1, e.offsetX / canvas.offsetWidth));
  const pos = Math.floor(pct * durationMs);
  progressMs = pos;
  updateProgress();
  await api(`/me/player/seek?position_ms=${pos}`, 'PUT').catch(()=>{});
}

async function setVolume(e, bar) {
  const pct = Math.round(Math.max(0, Math.min(1, e.offsetX / bar.offsetWidth)) * 100);
  volumePct = pct;
  document.getElementById('vol-fill').style.width = pct + '%';
  await api(`/me/player/volume?volume_percent=${pct}`, 'PUT').catch(()=>{});
}

async function playUri(uri) {
  await api('/me/player/play', 'PUT', { uris: [uri] }).catch(()=>{});
  setTimeout(() => { fetchState(); fetchQueue(); }, 600);
}

async function toggleLike() {
  const btn = document.getElementById('like-btn');
  const icon = document.getElementById('like-icon');
  const liked = icon.className.includes('filled');
  if (liked) {
    await api(`/me/tracks?ids=${currentTrackId}`, 'DELETE').catch(()=>{});
    icon.className = 'ti ti-heart';
    btn.classList.remove('liked');
  } else {
    await api(`/me/tracks?ids=${currentTrackId}`, 'PUT').catch(()=>{});
    icon.className = 'ti ti-heart-filled';
    btn.classList.add('liked');
  }
}

async function checkLiked() {
  if (!currentTrackId) return;
  try {
    const data = await api(`/me/tracks/contains?ids=${currentTrackId}`);
    const liked = data?.[0];
    document.getElementById('like-icon').className = liked ? 'ti ti-heart-filled' : 'ti ti-heart';
    liked ? document.getElementById('like-btn').classList.add('liked')
          : document.getElementById('like-btn').classList.remove('liked');
  } catch(e){}
}

function openSpotify() {
  if (currentUri) window.open('https://open.spotify.com/track/' + currentTrackId, '_blank');
}

function refreshState() { fetchState(); fetchQueue(); }

// ─── WAVEFORM ─────────────────────────────────────────────────────────────────

function generateWaveform() {
  waveformSeeds = [];
  for (let i = 0; i < 90; i++) {
    const v = Math.abs(
      Math.sin(i * 0.71) * 0.4 +
      Math.sin(i * 1.37) * 0.3 +
      Math.sin(i * 0.23) * 0.2 +
      (Math.random() * 0.1)
    );
    waveformSeeds.push(Math.max(0.05, Math.min(1, v)));
  }
}

function drawWaveform() {
  const canvas = document.getElementById('waveform-canvas');
  const parent = canvas.parentElement;
  if (!canvas.width || canvas.offsetWidth !== canvas.width) {
    canvas.width = parent.offsetWidth;
    canvas.height = parent.offsetHeight;
  }
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bars = waveformSeeds.length;
  if (!bars) return;
  const totalW = W;
  const bw = (totalW / bars) * 0.55;
  const gap = (totalW / bars) * 0.45;
  const progress = durationMs > 0 ? progressMs / durationMs : 0;

  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < bars; i++) {
    const x = i * (bw + gap);
    const h = Math.max(3, waveformSeeds[i] * H * 0.85);
    const y = (H - h) / 2;
    const frac = x / W;

    if (frac < progress) {
      ctx.fillStyle = '#1DB954';
      ctx.globalAlpha = 0.85;
    } else {
      ctx.fillStyle = '#2a2a2a';
      ctx.globalAlpha = 1;
    }

    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, bw, h, 2);
    else { ctx.rect(x, y, bw, h); }
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

async function initPlayer() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('player-screen').classList.add('active');
  generateWaveform();
  await fetchState();
  await fetchQueue();
  await checkLiked();
  startProgressTick();
  pollInterval = setInterval(async () => {
    await fetchState();
    await fetchQueue();
    await checkLiked();
  }, 5000);
  setTimeout(drawWaveform, 100);
  window.addEventListener('resize', drawWaveform);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const storedToken = localStorage.getItem('sp_access_token');
const storedExpiry = parseInt(localStorage.getItem('sp_token_expiry') || '0');

if (code) {
  if (storedToken) window.history.replaceState({}, '', REDIRECT_URI);
  else exchangeCode(code);
} else if (storedToken && Date.now() < storedExpiry) {
  accessToken = storedToken;
  tokenExpiry = storedExpiry;
  initPlayer();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
</script>
